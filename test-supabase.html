<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supabase Connection Test</title>
  <style>
    body { font-family: monospace; background: #1E1E1E; color: #F8F7F6; padding: 40px; }
    .status { font-size: 20px; margin: 20px 0; }
    .ok  { color: #90E9B8; }
    .err { color: #ff6b6b; }
    pre  { background: #2A2A2A; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; }
  </style>
</head>
<body>
  <h2>viax · Supabase Connection Test</h2>
  <div class="status" id="status">⏳ Testing connection...</div>
  <pre id="output"></pre>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL      = 'https://fsiyiyamxerpwooutriq.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzaXlpeWFteGVycHdvb3V0cmlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDMyMTEsImV4cCI6MjA4ODgxOTIxMX0.I0ciReCyyiBstTcZy0BKCc-4bFuOs2hAhaM41G82asU'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    const statusEl = document.getElementById('status')
    const outputEl = document.getElementById('output')

    try {
      // Ping Supabase — list tables via REST introspection
      const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`
        }
      })

      if (res.ok || res.status === 200) {
        statusEl.className = 'status ok'
        statusEl.textContent = '✓ Connected to Supabase successfully'
        outputEl.textContent = JSON.stringify({
          url: SUPABASE_URL,
          status: res.status,
          message: 'Connection OK — credentials are valid'
        }, null, 2)
      } else {
        throw new Error(`HTTP ${res.status}: ${await res.text()}`)
      }
    } catch (err) {
      statusEl.className = 'status err'
      statusEl.textContent = '✗ Connection failed'
      outputEl.textContent = err.message
    }
  </script>
</body>
</html>
